services:
  - type: web
    name: ai-video-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 1800 --workers 1 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MAX_UPLOAD_MB
        value: 2048
